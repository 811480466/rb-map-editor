<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Run&Bun地图编辑器</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">
  <div class="panel">
    <h2>ROM 中文地图事件查看器</h2>

    <div class="setup-entry">
      <button id="importBtn" type="button">导入</button>
      <button id="exportBtn" type="button">导出</button>
    </div>

    <h3>地图列表</h3>
    <input id="mapSearch" type="text" placeholder="搜索地图名 / header offset / section id / 尺寸 / 事件数量" />

    <div id="mapList" class="map-list">
      <div class="empty-tip">导入 ROM 后会自动扫描地图。</div>
    </div>
  </div>

  <div class="map-wrap">
    <!-- 中间地图区域 -->
  </div>
</div>
</body>
</html>
